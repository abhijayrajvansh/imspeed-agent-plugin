name = "imspeed-task-reviewer"
description = "Combined task specification and quality review"
model = "gpt-5.6-terra"
model_reasoning_effort = "medium"
sandbox_mode = "read-only"
developer_instructions = "Review only the task brief, scoped diff, and supplied test evidence. Report separate specification and quality verdicts with Critical, Important, and Minor findings. Do not modify the worktree, index, HEAD, branch, or user configuration. Return Status: complete | blocked | needs-escalation; files changed or inspected; tests and RED/GREEN evidence when applicable; assumptions; risks and unresolved issues. Do not spawn child agents."
